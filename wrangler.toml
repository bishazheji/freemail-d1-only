name = "mailfree"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db"
database_id = "a3db2eb5-5784-4608-920e-44b5ebcda776"

# 非敏感环境变量（适合公开仓库）
[vars]
MAIL_DOMAIN = "cycn.eu.cc"
ADMIN_NAME = "admin"

# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
binding = "ASSETS"

# （D1-only 版本）
# 注意：此版本不依赖 R2 存完整 EML
# 仅将邮件预览/验证码写入 D1

# 可选日志
# [observability.logs]
# enabled = true
